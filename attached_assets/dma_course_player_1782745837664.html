<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Manufacturing Academy — Course Player</title>
<style>
  :root{
    --midnight-1:#060c1a;
    --midnight-2:#0a1530;
    --midnight-3:#0f1f44;
    --panel:#0c1838;
    --line:#1c2c55;
    --sky:#38bdf8;
    --sky-glow:#7fe3ff;
    --sky-dim:#1a4a66;
    --text:#e7eefc;
    --text-dim:#8fa0c9;
    --good:#34d399;
    --bad:#f87171;
    --warn:#fbbf24;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--midnight-1);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;height:100%;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(56,189,248,0.08), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(56,189,248,0.06), transparent 45%),
      var(--midnight-1);
    min-height:100vh;
  }
  .app{display:flex; min-height:100vh;}

  /* ===== Sidebar ===== */
  .sidebar{
    width:300px; flex-shrink:0;
    background:linear-gradient(180deg,var(--midnight-2),var(--midnight-1));
    border-right:1px solid var(--line);
    padding:22px 18px;
    display:flex; flex-direction:column; gap:18px;
  }
  .brand{display:flex; align-items:center; gap:10px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .brand-mark{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--sky),#1d4f7a);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#02101f;font-size:15px;
    box-shadow:0 0 18px rgba(56,189,248,0.55);
  }
  .brand-text{line-height:1.15;}
  .brand-text b{font-size:14.5px; letter-spacing:.3px;}
  .brand-text span{font-size:11px;color:var(--text-dim);}

  .overall{padding:4px 2px 10px;}
  .overall-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
  .bar-track{height:9px;border-radius:6px;background:#0c1733;border:1px solid var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#1d6f99,var(--sky),var(--sky-glow));box-shadow:0 0 10px rgba(56,189,248,0.7);transition:width .5s ease;}

  .module-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
  .module-item{
    padding:12px 12px; border-radius:10px; border:1px solid var(--line);
    background:rgba(255,255,255,0.015); cursor:pointer; transition:.15s;
  }
  .module-item:hover{border-color:var(--sky-dim); background:rgba(56,189,248,0.05);}
  .module-item.active{border-color:var(--sky); background:rgba(56,189,248,0.1); box-shadow:0 0 14px rgba(56,189,248,0.18) inset;}
  .module-item .mi-top{display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600;}
  .module-item .mi-type{font-size:10.5px; color:var(--text-dim); margin-top:3px; text-transform:uppercase; letter-spacing:.4px;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .status-dot.locked{background:#2b3a63;}
  .status-dot.inprogress{background:var(--warn); box-shadow:0 0 8px rgba(251,191,36,.7);}
  .status-dot.done{background:var(--good); box-shadow:0 0 8px rgba(52,211,153,.7);}

  .mini-progress{height:5px;border-radius:4px;background:#0c1733;margin-top:8px;overflow:hidden;}
  .mini-progress i{display:block;height:100%;background:var(--sky); box-shadow:0 0 6px rgba(56,189,248,.6);}

  .instructor-toggle{
    margin-top:auto; padding-top:14px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; font-size:12.5px; color:var(--text-dim);
  }
  .switch{position:relative;width:38px;height:20px;background:#142450;border-radius:20px;cursor:pointer;border:1px solid var(--line);}
  .switch.on{background:var(--sky-dim);}
  .switch i{position:absolute;top:1px;left:1px;width:16px;height:16px;border-radius:50%;background:#cdd9f5;transition:.2s;}
  .switch.on i{left:19px;background:var(--sky-glow); box-shadow:0 0 8px var(--sky);}

  /* ===== Main ===== */
  .main{flex:1; padding:26px 34px; max-width:980px; margin:0 auto; width:100%;}
  .top-row{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:20px;}
  .top-row h1{font-size:22px; margin:0 0 4px;}
  .top-row p{margin:0; color:var(--text-dim); font-size:13.5px;}
  .pill{font-size:11px; padding:4px 10px; border-radius:20px; border:1px solid var(--sky-dim); color:var(--sky-glow); background:rgba(56,189,248,0.08); white-space:nowrap;}

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; margin-bottom:20px;
  }

  /* Player */
  .player-stage{
    position:relative; border-radius:12px; overflow:hidden;
    background:linear-gradient(160deg,#0d1c3e,#08122a);
    border:1px solid var(--line);
    aspect-ratio:16/9; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  .player-stage::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(56,189,248,0.12), transparent 60%);
    pointer-events:none;
  }
  .slide-eyebrow{font-size:11px; letter-spacing:1.5px; color:var(--sky-glow); text-transform:uppercase; margin-bottom:10px;}
  .slide-title{font-size:26px; font-weight:700; margin:0 0 12px; max-width:600px;}
  .slide-body{font-size:14.5px; color:var(--text-dim); max-width:540px; line-height:1.55;}
  .live-dot{
    position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:6px;
    font-size:11px; color:#ffb4b4; background:rgba(0,0,0,0.35); padding:4px 9px; border-radius:20px;
  }
  .live-dot span{width:7px;height:7px;border-radius:50%;background:#ff5c5c;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  .doc-page{font-size:13.5px; line-height:1.7; color:var(--text-dim); text-align:left; max-width:600px; max-height:100%; overflow:hidden;}
  .doc-page mark{background:rgba(56,189,248,0.25); color:var(--sky-glow); border-radius:3px; padding:0 2px;}

  .player-controls{display:flex; align-items:center; gap:10px; margin-top:14px;}
  .ctrl-btn{
    background:var(--midnight-3); border:1px solid var(--line); color:var(--text);
    padding:9px 14px; border-radius:9px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:6px;
    transition:.15s;
  }
  .ctrl-btn:hover{border-color:var(--sky); color:var(--sky-glow);}
  .ctrl-btn:disabled{opacity:.35; cursor:not-allowed;}
  .ctrl-btn.primary{background:linear-gradient(135deg,var(--sky),#1d6f99); color:#02101f; font-weight:700; border:none; box-shadow:0 0 14px rgba(56,189,248,.4);}
  .ctrl-spacer{flex:1;}
  .scrub-track{flex:1; height:5px; background:#0c1733; border-radius:6px; overflow:hidden; cursor:pointer;}
  .scrub-fill{height:100%; background:var(--sky); box-shadow:0 0 6px var(--sky);}
  .slide-counter{font-size:12px; color:var(--text-dim); white-space:nowrap;}

  /* Quiz */
  .quiz-q{margin-bottom:18px;}
  .quiz-q .qtext{font-size:14.5px; font-weight:600; margin-bottom:10px;}
  .opt{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line);
    border-radius:9px; margin-bottom:8px; cursor:pointer; font-size:13.5px; transition:.15s;
  }
  .opt:hover{border-color:var(--sky-dim); background:rgba(56,189,248,0.04);}
  .opt.selected{border-color:var(--sky); background:rgba(56,189,248,0.1);}
  .opt.correct{border-color:var(--good); background:rgba(52,211,153,0.1);}
  .opt.incorrect{border-color:var(--bad); background:rgba(248,113,113,0.1);}
  .opt .bullet{width:16px;height:16px;border-radius:50%;border:1px solid var(--text-dim); flex-shrink:0;}
  .opt.selected .bullet{border-color:var(--sky); background:var(--sky);}
  .opt.correct .bullet{border-color:var(--good); background:var(--good);}
  .opt.incorrect .bullet{border-color:var(--bad); background:var(--bad);}
  .explain{font-size:12.5px; color:var(--text-dim); margin-top:8px; padding:10px; border-left:2px solid var(--sky-dim); background:rgba(255,255,255,0.02); border-radius:0 8px 8px 0; display:none;}
  .explain.show{display:block;}

  .quiz-result{
    text-align:center; padding:20px; border-radius:12px; margin-top:6px;
  }
  .quiz-result.pass{background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.35);}
  .quiz-result.fail{background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.35);}
  .quiz-result h3{margin:0 0 6px; font-size:20px;}
  .quiz-result p{margin:0; color:var(--text-dim); font-size:13px;}

  /* Instructor panel */
  .instr-panel{border:1px dashed var(--sky-dim); border-radius:12px; padding:16px; margin-top:6px; background:rgba(56,189,248,0.03);}
  .instr-panel h4{margin:0 0 10px; font-size:13px; color:var(--sky-glow); display:flex; align-items:center; gap:6px;}
  .form-row{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  input[type=text], select{
    background:#08122a; border:1px solid var(--line); color:var(--text); padding:9px 10px;
    border-radius:8px; font-size:13px; flex:1; min-width:140px;
  }
  input[type=text]:focus, select:focus{outline:none; border-color:var(--sky);}
  .opt-input-row{display:flex; gap:8px; align-items:center; margin-bottom:6px;}
  .opt-input-row input[type=radio]{accent-color:var(--sky);}

  .certificate{
    border:2px solid var(--sky); border-radius:14px; padding:36px; text-align:center;
    background:radial-gradient(circle at 50% 0%, rgba(56,189,248,0.12), transparent 60%), var(--midnight-2);
    box-shadow:0 0 30px rgba(56,189,248,0.25);
  }
  .certificate .cert-mark{font-size:13px; letter-spacing:3px; color:var(--sky-glow); margin-bottom:14px;}
  .certificate h2{font-size:26px; margin:0 0 6px;}
  .certificate .cert-name{font-size:30px; color:var(--sky-glow); margin:14px 0; font-weight:700; font-family:Georgia,serif;}
  .certificate .cert-meta{font-size:12.5px; color:var(--text-dim); margin-top:18px;}
  .qr-fake{width:64px;height:64px;margin:18px auto 0; background:
     repeating-linear-gradient(0deg,#0c1838 0 4px, transparent 4px 8px),
     repeating-linear-gradient(90deg,#0c1838 0 4px, transparent 4px 8px);
     border:2px solid var(--sky-dim); border-radius:6px;}

  .empty-hint{font-size:12px; color:var(--text-dim); text-align:center; padding:20px;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#1c2c55;border-radius:8px;}
</style>
</head>
<body>
<div class="app">

  <div class="sidebar">
    <div class="brand">
      <div class="brand-mark">MD</div>
      <div class="brand-text"><b>Digital Manufacturing Academy</b><br><span>Course Player</span></div>
    </div>

    <div class="overall">
      <div class="overall-label"><span>Course Progress</span><span id="overallPct">0%</span></div>
      <div class="bar-track"><div class="bar-fill" id="overallBar" style="width:0%"></div></div>
    </div>

    <div class="module-list" id="moduleList"></div>

    <div class="instructor-toggle">
      <span>Instructor mode</span>
      <div class="switch" id="instructorSwitch"><i></i></div>
    </div>
  </div>

  <div class="main" id="mainArea"></div>
</div>

<script>
/* ===================== DATA MODEL ===================== */
const COURSE = {
  title: "Modern Workplace Safety & Protocols",
  modules: [
    {
      id:'m1', title:'Hazard Identification & Prevention', player:'slides',
      sub:'DMA Presentation Player · hazard_guide_2026.pptx',
      objective:'Identify physical, chemical, and ergonomic hazards in a hybrid workspace.',
      slides:[
        {eyebrow:'Lesson 1.1', title:'Recognizing Red Flags', body:'Spot the early warning signs of hazards before they become incidents — spills, exposed wiring, blocked exits, and overloaded circuits.'},
        {eyebrow:'Lesson 1.1', title:'The 4 Hazard Categories', body:'Physical (slips, falls, machinery), Chemical (fumes, cleaning agents), Ergonomic (posture, repetitive strain), and Psychosocial (stress, fatigue).'},
        {eyebrow:'Lesson 1.2', title:'Preventive Ergonomics', body:'Desk height, monitor distance, and chair posture reduce long-term strain injuries across hybrid desk arrays.'},
        {eyebrow:'Lesson 1.2', title:'Daily Self-Check Habit', body:'A 30-second hazard scan at the start of every shift catches most preventable incidents before they happen.'},
      ],
      quiz:[
        {q:'Which of the following is an example of an ergonomic hazard?', type:'mcq', options:['A frayed extension cord','Poor monitor height causing neck strain','A spilled liquid on the floor','Strong cleaning fumes'], correct:1, explain:'Ergonomic hazards relate to body positioning and repetitive strain — like poor monitor height — not chemical or physical trip hazards.'},
        {q:'A daily hazard self-check should ideally take about 30 seconds.', type:'tf', correct:true, explain:'A quick, consistent scan is designed to be fast enough that people actually do it every shift.'},
        {q:'Which hazard category covers workplace stress and fatigue?', type:'mcq', options:['Physical','Chemical','Ergonomic','Psychosocial'], correct:3, explain:'Psychosocial hazards cover mental and emotional strain factors like stress, fatigue, and burnout.'},
      ]
    },
    {
      id:'m2', title:'Emergency Response Protocols', player:'document',
      sub:'DMA Document Learning Player · evacuation_manual_v4.pdf',
      objective:'Navigate standard operating procedures during critical building events.',
      pages:[
        {title:'2.1 Active Drills & Muster Points', text:'When an alarm sounds, employees must proceed calmly to their <mark>designated muster point</mark> using the nearest safe exit. Do not use elevators. Floor wardens will confirm headcounts against the daily sign-in sheet.'},
        {title:'2.1 Drill Frequency', text:'Evacuation drills are conducted quarterly. Each drill is logged with <mark>start time, evacuation duration, and any blocked egress routes</mark> identified during the exercise.'},
        {title:'2.2 Escalation Trees', text:'Incidents are escalated in order: Floor Warden → Site Safety Officer → Facilities Director → Executive Crisis Team. Any escalation skipping a tier must be logged and justified within <mark>24 hours</mark>.'},
        {title:'2.2 Reporting Requirements', text:'All incidents, regardless of severity, must be filed in the Incident Reporting System within one business day, including a brief description and any corrective action taken.'},
      ],
      quiz:[
        {q:'During an evacuation, employees should use elevators if the stairwell is crowded.', type:'tf', correct:false, explain:'Elevators must never be used during an evacuation, regardless of stairwell congestion, due to power and entrapment risk.'},
        {q:'How often are evacuation drills conducted?', type:'mcq', options:['Monthly','Quarterly','Annually','Only after an incident'], correct:1, explain:'The manual specifies drills occur quarterly, with logged duration and any blocked routes.'},
        {q:'An escalation that skips a tier in the escalation tree must be justified within how long?', type:'mcq', options:['1 hour','24 hours','One week','It never needs justification'], correct:1, explain:'Skipped tiers must be logged and justified within 24 hours to preserve accountability.'},
      ]
    },
    {
      id:'m3', title:'Interactive Fire Safety Simulation', player:'interactive',
      sub:'DMA Interactive HTML Experience (Premium) · fire_extinguisher_sim.zip',
      objective:'Practically apply the P.A.S.S. method in a virtual high-stress situation.',
      sim:{title:'Virtual Sandbox: Fire Suppression System', body:'Pull the Pin → Aim low at the base → Squeeze the handle → Sweep side to side. Complete the simulated sequence to register a successful suppression.'},
      quiz:[
        {q:'What does the "A" in the P.A.S.S. method stand for?', type:'mcq', options:['Activate','Aim','Assess','Alarm'], correct:1, explain:'P.A.S.S. = Pull, Aim (at the base of the fire), Squeeze, Sweep.'},
        {q:'You should aim a fire extinguisher at the top of the flames.', type:'tf', correct:false, explain:'Extinguishers should be aimed low, at the base of the fire, where the fuel source is — not at the visible flames.'},
      ]
    }
  ]
};

/* ===================== STATE ===================== */
let state = {
  activeModuleId: COURSE.modules[0].id,
  slideIndex: {}, // moduleId -> index
  quizAnswers: {}, // moduleId -> {qIndex: selectedIndex/bool}
  quizSubmitted: {}, // moduleId -> bool
  moduleStatus: {}, // moduleId -> 'locked'|'inprogress'|'done'
  instructorMode: false,
  autoplay: null,
};
COURSE.modules.forEach((m,i)=>{
  state.slideIndex[m.id]=0;
  state.quizAnswers[m.id]={};
  state.quizSubmitted[m.id]=false;
  state.moduleStatus[m.id] = i===0 ? 'inprogress' : 'locked';
});

function moduleById(id){ return COURSE.modules.find(m=>m.id===id); }
function moduleIndex(id){ return COURSE.modules.findIndex(m=>m.id===id); }

function overallProgress(){
  const total = COURSE.modules.length;
  const done = COURSE.modules.filter(m=>state.moduleStatus[m.id]==='done').length;
  return Math.round((done/total)*100);
}

/* ===================== RENDER: SIDEBAR ===================== */
function renderSidebar(){
  const pct = overallProgress();
  document.getElementById('overallPct').textContent = pct+'%';
  document.getElementById('overallBar').style.width = pct+'%';

  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  COURSE.modules.forEach(m=>{
    const status = state.moduleStatus[m.id];
    const div = document.createElement('div');
    div.className = 'module-item' + (m.id===state.activeModuleId?' active':'');
    let progressPct = 0;
    if(status==='done') progressPct = 100;
    else if(m.player==='slides') progressPct = Math.round(((state.slideIndex[m.id]+1)/m.slides.length)*60);
    else if(m.player==='document') progressPct = Math.round(((state.slideIndex[m.id]+1)/m.pages.length)*60);
    else if(m.player==='interactive') progressPct = state.quizSubmitted[m.id] ? 100 : 30;

    div.innerHTML = `
      <div class="mi-top">
        <span>${moduleIndex(m.id)+1}. ${m.title}</span>
        <span class="status-dot ${status==='done'?'done':status==='inprogress'?'inprogress':'locked'}"></span>
      </div>
      <div class="mi-type">${m.player} player</div>
      <div class="mini-progress"><i style="width:${progressPct}%"></i></div>
    `;
    div.onclick = ()=>{
      if(status==='locked'){ flashLocked(div); return; }
      state.activeModuleId = m.id;
      renderAll();
    };
    list.appendChild(div);
  });

  const sw = document.getElementById('instructorSwitch');
  sw.className = 'switch'+(state.instructorMode?' on':'');
  sw.onclick = ()=>{ state.instructorMode = !state.instructorMode; renderAll(); };
}
function flashLocked(el){
  el.style.borderColor='var(--bad)';
  setTimeout(()=>{el.style.borderColor='var(--line)';},400);
}

/* ===================== RENDER: MAIN ===================== */
function renderAll(){ renderSidebar(); renderMain(); }

function renderMain(){
  const main = document.getElementById('mainArea');
  const m = moduleById(state.activeModuleId);
  const allDone = COURSE.modules.every(mm=>state.moduleStatus[mm.id]==='done');

  let html = `
    <div class="top-row">
      <div>
        <h1>${m.title}</h1>
        <p>${m.objective}</p>
      </div>
      <span class="pill">${m.sub}</span>
    </div>
  `;

  html += `<div class="card">${renderPlayer(m)}</div>`;

  if(state.moduleStatus[m.id]!=='locked' && hasReachedEnd(m)){
    html += `<div class="card" id="quizCard">${renderQuiz(m)}</div>`;
  }

  if(state.instructorMode){
    html += `<div class="card"><div class="instr-panel" id="instrPanel">${renderInstructorPanel(m)}</div></div>`;
  }

  if(allDone){
    html += `<div class="card">${renderCertificateBlock()}</div>`;
  }

  main.innerHTML = html;
  wirePlayerEvents(m);
  wireQuizEvents(m);
  wireInstructorEvents(m);
}

/* ---------- Player rendering ---------- */
function hasReachedEnd(m){
  if(m.player==='slides') return state.slideIndex[m.id] >= m.slides.length-1;
  if(m.player==='document') return state.slideIndex[m.id] >= m.pages.length-1;
  if(m.player==='interactive') return true; // single sim screen
  return false;
}

function renderPlayer(m){
  if(m.player==='slides'){
    const i = state.slideIndex[m.id];
    const s = m.slides[i];
    return `
      <div class="player-stage">
        <div class="live-dot"><span></span>LIVE SLIDE VIEW</div>
        <div class="slide-eyebrow">${s.eyebrow}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-body">${s.body}</div>
      </div>
      ${renderTransportControls(m, i, m.slides.length)}
    `;
  }
  if(m.player==='document'){
    const i = state.slideIndex[m.id];
    const p = m.pages[i];
    return `
      <div class="player-stage" style="align-items:flex-start; text-align:left;">
        <div class="live-dot" style="background:rgba(0,0,0,.35)"><span style="background:var(--sky); box-shadow:0 0 6px var(--sky)"></span>SCROLL / HIGHLIGHT MODE</div>
        <div class="slide-eyebrow">${p.title}</div>
        <div class="doc-page">${p.text}</div>
      </div>
      ${renderTransportControls(m, i, m.pages.length)}
    `;
  }
  if(m.player==='interactive'){
    return `
      <div class="player-stage">
        <div class="live-dot"><span></span>SANDBOXED SIMULATION</div>
        <div class="slide-eyebrow">Iframe Simulation</div>
        <div class="slide-title">${m.sim.title}</div>
        <div class="slide-body">${m.sim.body}</div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn primary" id="simRunBtn">▶ Run P.A.S.S. Sequence</button>
        <span class="slide-counter" id="simStatus">Not started</span>
      </div>
    `;
  }
  return '';
}

function renderTransportControls(m, i, total){
  const pct = Math.round(((i+1)/total)*100);
  return `
    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn" ${i===0?'disabled':''}>⏮ Prev</button>
      <button class="ctrl-btn primary" id="nextBtn" ${i===total-1?'disabled':''}>${i===total-1?'End':'Next ⏭'}</button>
      <button class="ctrl-btn" id="autoplayBtn">${state.autoplay===m.id?'⏸ Pause':'▶ Autoplay'}</button>
      <div class="scrub-track"><div class="scrub-fill" style="width:${pct}%"></div></div>
      <span class="slide-counter">${i+1} / ${total}</span>
    </div>
  `;
}

function wirePlayerEvents(m){
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  const auto = document.getElementById('autoplayBtn');
  const simBtn = document.getElementById('simRunBtn');

  if(prev) prev.onclick = ()=>{ stopAutoplay(); state.slideIndex[m.id] = Math.max(0,state.slideIndex[m.id]-1); renderAll(); };
  if(next) next.onclick = ()=>{
    stopAutoplay();
    const total = m.player==='slides'?m.slides.length:m.pages.length;
    state.slideIndex[m.id] = Math.min(total-1, state.slideIndex[m.id]+1);
    renderAll();
  };
  if(auto) auto.onclick = ()=>{
    if(state.autoplay===m.id){ stopAutoplay(); renderAll(); return; }
    stopAutoplay();
    state.autoplay = m.id;
    state.autoplayTimer = setInterval(()=>{
      const total = m.player==='slides'?m.slides.length:m.pages.length;
      if(state.slideIndex[m.id] < total-1){
        state.slideIndex[m.id]++;
        renderAll();
      } else { stopAutoplay(); renderAll(); }
    }, 2600);
    renderAll();
  };
  if(simBtn) simBtn.onclick = ()=>{
    document.getElementById('simStatus').textContent = 'Sequence complete ✓';
    simBtn.disabled = true;
    simBtn.textContent = '✓ Sequence Verified';
    renderAll();
  };
}
function stopAutoplay(){ if(state.autoplayTimer) clearInterval(state.autoplayTimer); state.autoplay=null; }

/* ---------- Quiz rendering ---------- */
function renderQuiz(m){
  const submitted = state.quizSubmitted[m.id];
  const answers = state.quizAnswers[m.id];

  let qHtml = `<h3 style="margin:0 0 4px;font-size:16px;">📝 Self-Assessment Quiz</h3>
    <p style="margin:0 0 18px;color:var(--text-dim);font-size:12.5px;">${m.quiz.length} questions · Mixed MCQ &amp; True/False · Passing score 70%</p>`;

  m.quiz.forEach((q,qi)=>{
    qHtml += `<div class="quiz-q" data-qi="${qi}">`;
    qHtml += `<div class="qtext">${qi+1}. ${q.q}</div>`;

    if(q.type==='mcq'){
      q.options.forEach((opt,oi)=>{
        let cls='opt';
        const sel = answers[qi]===oi;
        if(sel) cls+=' selected';
        if(submitted){
          if(oi===q.correct) cls+=' correct';
          else if(sel && oi!==q.correct) cls+=' incorrect';
        }
        qHtml += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}"><div class="bullet"></div><div>${opt}</div></div>`;
      });
    } else {
      [['True',true],['False',false]].forEach(([label,val])=>{
        let cls='opt';
        const sel = answers[qi]===val;
        if(sel) cls+=' selected';
        if(submitted){
          if(val===q.correct) cls+=' correct';
          else if(sel && val!==q.correct) cls+=' incorrect';
        }
        qHtml += `<div class="${cls}" data-qi="${qi}" data-tf="${val}"><div class="bullet"></div><div>${label}</div></div>`;
      });
    }
    qHtml += `<div class="explain ${submitted?'show':''}">💡 ${q.explain}</div>`;
    qHtml += `</div>`;
  });

  if(!submitted){
    const allAnswered = m.quiz.every((q,qi)=>answers[qi]!==undefined);
    qHtml += `<button class="ctrl-btn primary" id="submitQuizBtn" ${allAnswered?'':'disabled'} style="width:100%;justify-content:center;margin-top:6px;">Submit Quiz</button>`;
  } else {
    const correctCount = m.quiz.filter((q,qi)=> q.type==='mcq' ? answers[qi]===q.correct : answers[qi]===q.correct).length;
    const score = Math.round((correctCount/m.quiz.length)*100);
    const passed = score>=70;
    qHtml += `<div class="quiz-result ${passed?'pass':'fail'}">
      <h3 style="color:${passed?'var(--good)':'var(--bad)'}">${passed?'✅ Passed':'❌ Not Quite'} — ${score}%</h3>
      <p>${passed?'Great work — this module is now complete and the next one is unlocked.':'You need 70% to pass. Review the explanations above, then retake the quiz.'}</p>
    </div>`;
    if(!passed){
      qHtml += `<button class="ctrl-btn primary" id="retakeBtn" style="width:100%;justify-content:center;margin-top:12px;">↻ Retake Quiz</button>`;
    } else {
      const isLast = moduleIndex(m.id)===COURSE.modules.length-1;
      qHtml += `<button class="ctrl-btn primary" id="continueBtn" style="width:100%;justify-content:center;margin-top:12px;">${isLast?'🏁 Finish Course':'Continue to Next Module →'}</button>`;
    }
  }

  return qHtml;
}

function wireQuizEvents(m){
  const card = document.getElementById('quizCard');
  if(!card) return;
  const submitted = state.quizSubmitted[m.id];

  if(!submitted){
    card.querySelectorAll('.opt').forEach(opt=>{
      opt.onclick = ()=>{
        const qi = parseInt(opt.dataset.qi);
        if(opt.dataset.oi!==undefined) state.quizAnswers[m.id][qi] = parseInt(opt.dataset.oi);
        if(opt.dataset.tf!==undefined) state.quizAnswers[m.id][qi] = opt.dataset.tf==='true';
        renderAll();
      };
    });
    const submitBtn = document.getElementById('submitQuizBtn');
    if(submitBtn) submitBtn.onclick = ()=>{ state.quizSubmitted[m.id]=true; renderAll(); };
  } else {
    const retake = document.getElementById('retakeBtn');
    if(retake) retake.onclick = ()=>{
      state.quizSubmitted[m.id]=false;
      state.quizAnswers[m.id]={};
      renderAll();
    };
    const cont = document.getElementById('continueBtn');
    if(cont) cont.onclick = ()=>{
      state.moduleStatus[m.id]='done';
      const idx = moduleIndex(m.id);
      if(idx+1 < COURSE.modules.length){
        const nextM = COURSE.modules[idx+1];
        state.moduleStatus[nextM.id]='inprogress';
        state.activeModuleId = nextM.id;
      }
      renderAll();
    };
  }
}

/* ---------- Instructor panel ---------- */

  return `
    <h4>🛠 Instructor Tools — add a question to "${m.title}"</h4>
    <div class="form-row">
      <input type="text" id="newQText" placeholder="Question text...">
      <select id="newQType">
        <option value="mcq">Multiple Choice</option>
        <option value="tf">True / False</option>
      </select>
    </div>
    <div id="mcqOptsWrap">
      <div class="opt-input-row"><input type="radio" name="correctOpt" value="0" checked><input type="text" class="optText" placeholder="Option A"></div>
      <div class="opt-input-row"><input type="radio" name="correctOpt" value="1"><input type="text" class="optText" placeholder="Option B"></div>
      <div class="opt-input-row"><input type="radio" name="correctOpt" value="2"><input type="text" class="optText" placeholder="Option C"></div>
      <div class="opt-input-row"><input type="radio" name="correctOpt" value="3"><input type="text" class="optText" placeholder="Option D"></div>
    </div>
    <div id="tfOptsWrap" style="display:none;">
      <div class="opt-input-row"><input type="radio" name="correctTf" value="true" checked> True</div>
      <div class="opt-input-row"><input type="radio" name="correctTf" value="false"> False</div>
    </div>
    <input type="text" id="newQExplain" placeholder="Explanation shown after submitting (why correct)..." style="width:100%;margin-bottom:10px;">
    <button class="ctrl-btn primary" id="addQBtn">+ Add Question to Module</button>
    <p style="font-size:11px;color:var(--text-dim);margin-top:10px;">Questions append to this module's self-assessment quiz immediately. Instructor mode also exposes a locked-module preview below.</p>
    <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px;">
      <b style="font-size:12.5px;">All modules (instructor overview)</b>
      <ul style="font-size:12px;color:var(--text-dim);padding-left:18px;margin-top:8px;line-height:1.6;">
        ${COURSE.modules.map(mm=>`<li>${mm.title} — ${mm.quiz.length} quiz questions — status: ${state.moduleStatus[mm.id]}</li>`).join('')}
      </ul>
    </div>
  `;
}

function wireInstructorEvents(m){
  const panel = document.getElementById('instrPanel');
  if(!panel) return;
  const typeSel = document.getElementById('newQType');
  typeSel.onchange = ()=>{
    document.getElementById('mcqOptsWrap').style.display = typeSel.value==='mcq' ? 'block':'none';
    document.getElementById('tfOptsWrap').style.display = typeSel.value==='tf' ? 'block':'none';
  };
  document.getElementById('addQBtn').onclick = ()=>{
    const text = document.getElementById('newQText').value.trim();
    const explain = document.getElementById('newQExplain').value.trim() || 'No explanation provided.';
    if(!text){ alert('Please enter question text.'); return; }
    if(typeSel.value==='mcq'){
      const opts = [...panel.querySelectorAll('.optText')].map(i=>i.value.trim());
      if(opts.some(o=>!o)){ alert('Please fill in all four options.'); return; }
      const correct = parseInt(panel.querySelector('input[name=correctOpt]:checked').value);
      m.quiz.push({q:text, type:'mcq', options:opts, correct, explain});
    } else {
      const correct = panel.querySelector('input[name=correctTf]:checked').value === 'true';
      m.quiz.push({q:text, type:'tf', correct, explain});
    }
    renderAll();
  };
}
